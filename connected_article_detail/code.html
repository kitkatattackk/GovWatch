<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=390, initial-scale=1.0"/>
<title>GovWatch - Article</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  body { background: #0B0E14; color: #F1F3FC; font-family: 'Inter', sans-serif; max-width: 390px; margin: 0 auto; min-height: 100vh; }
  .msym { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; direction: ltr; font-size: 22px; }
  ::-webkit-scrollbar { display: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .skeleton { background: #1A2235; border-radius: 8px; animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-4 py-3 border-b" style="background:rgba(11,14,20,0.95);backdrop-filter:blur(12px);border-color:#1A2235;max-width:390px">
  <button onclick="history.back()" class="flex items-center justify-center w-10 h-10 rounded-full text-slate-400 hover:bg-white/10 transition-colors">
    <span class="msym">arrow_back</span>
  </button>
  <div class="text-sm font-black tracking-widest uppercase" style="color:#81ECFF">GovWatch</div>
  <a id="share-btn" href="#" target="_blank"
    class="flex items-center justify-center w-10 h-10 rounded-full text-slate-400 hover:bg-white/10 transition-colors">
    <span class="msym">open_in_new</span>
  </a>
</nav>

<!-- Progress bar -->
<div class="fixed top-[57px] left-0 w-full h-[2px] z-50" style="max-width:390px">
  <div id="progress-bar" class="h-full w-0 transition-all duration-300" style="background:linear-gradient(90deg,#81ECFF,#669DFF);box-shadow:0 0 8px rgba(129,236,255,0.8)"></div>
</div>

<!-- Hero -->
<div id="hero" class="relative w-full flex items-end pt-16" style="min-height:280px">
  <!-- Category gradient background -->
  <div id="hero-bg" class="absolute inset-0" style="background:linear-gradient(135deg,#0B0E14 0%,#162850 100%)"></div>
  <div class="absolute inset-0" style="background:linear-gradient(to bottom, transparent 30%, #0B0E14 100%)"></div>

  <div class="relative z-10 w-full px-5 pb-8">
    <div id="cat-tag" class="inline-flex items-center px-3 py-1 mb-4 rounded-md text-[10px] font-extrabold tracking-widest uppercase"
      style="background:rgba(129,236,255,0.1);border:1px solid rgba(129,236,255,0.2);color:#81ECFF">—</div>
    <h1 id="article-title" class="text-[22px] font-extrabold leading-tight text-white mb-4"></h1>
    <div class="flex items-center gap-3">
      <img id="author-avatar" src="" class="w-10 h-10 rounded-full border-2 object-cover" style="border-color:rgba(129,236,255,0.3)"/>
      <div>
        <p id="author-name" class="text-white font-bold text-[14px]"></p>
        <p id="article-time" class="text-[12px]" style="color:#8899AA"></p>
      </div>
    </div>
  </div>
</div>

<!-- Body -->
<main class="px-5 pb-32 -mt-2">
  <!-- AI Brief card -->
  <div id="brief-card" class="rounded-2xl p-4 mb-5 border" style="background:#111827;border-color:#1E2A3B">
    <div class="flex items-center gap-2 mb-2">
      <span class="msym" style="font-size:16px;color:#60A5FA">auto_awesome</span>
      <span class="text-[11px] font-bold uppercase tracking-wider" style="color:#60A5FA">AI Brief</span>
    </div>
    <p id="brief-text" class="text-[13px] leading-relaxed" style="color:#8899AA"></p>
  </div>

  <!-- Article content -->
  <div id="article-body" class="text-[15px] leading-relaxed space-y-4" style="color:#CBD5E1"></div>

  <!-- Read original -->
  <div class="mt-8">
    <a id="read-original" href="#" target="_blank"
      class="flex items-center justify-center gap-2 w-full py-3.5 rounded-2xl font-semibold text-[14px]"
      style="background:#2563EB;color:white">
      <span class="msym" style="font-size:18px">open_in_new</span>
      Read Original Article
    </a>
  </div>
</main>

<!-- Floating bottom bar -->
<div class="fixed bottom-0 left-0 w-full z-50 px-4 pb-8 pt-4" style="max-width:390px;background:linear-gradient(to top,#0B0E14 60%,transparent)">
  <div class="flex items-center gap-3 p-2 rounded-full border" style="background:rgba(11,14,20,0.8);backdrop-filter:blur(20px);border-color:rgba(255,255,255,0.08)">
    <button class="flex-1 flex items-center justify-center gap-2 py-3 rounded-full border text-[11px] font-bold uppercase tracking-wider"
      style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:#F1F3FC">
      <span class="msym" style="font-size:18px">bookmark_border</span>
      Bookmark
    </button>
    <a id="bottom-read-btn" href="#" target="_blank"
      class="flex-1 flex items-center justify-center gap-2 py-3 rounded-full text-[11px] font-bold uppercase tracking-wider"
      style="background:#81ECFF;color:#003840">
      <span class="msym" style="font-size:18px">send</span>
      Share
    </a>
  </div>
</div>

<script>
const API = 'http://localhost:3000';

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function relativeTime(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return Math.floor(hrs/24) === 1 ? 'Yesterday' : `${Math.floor(hrs/24)}d ago`;
}

const CAT_STYLES = {
  bills_votes:         { label:'Bills & Votes',      bg:'rgba(59,130,246,0.1)',  border:'rgba(59,130,246,0.3)',  text:'#93C5FD', heroBg:'linear-gradient(135deg,#0B0E14 0%,#162850 100%)' },
  executive_orders:    { label:'Executive Orders',   bg:'rgba(245,158,11,0.1)', border:'rgba(245,158,11,0.3)', text:'#FCD34D', heroBg:'linear-gradient(135deg,#0B0E14 0%,#2d1a00 100%)' },
  court_rulings:       { label:'Court Rulings',      bg:'rgba(167,139,250,0.1)',border:'rgba(167,139,250,0.3)',text:'#C4B5FD', heroBg:'linear-gradient(135deg,#0B0E14 0%,#1e1030 100%)' },
  government_spending: { label:'Government Spending',bg:'rgba(52,211,153,0.1)', border:'rgba(52,211,153,0.3)', text:'#6EE7B7', heroBg:'linear-gradient(135deg,#0B0E14 0%,#0a1e15 100%)' },
  opinion:             { label:'Opinion',            bg:'rgba(244,114,182,0.1)',border:'rgba(244,114,182,0.3)',text:'#FDA4AF', heroBg:'linear-gradient(135deg,#0B0E14 0%,#1a0a2e 100%)' },
};

function avatarUrl(name, source) {
  const colors = {
    congress:'162850/93c5fd', federalregister:'2d1a00/fcd34d',
    courtlistener:'1e1030/c4b5fd', usaspending:'0a1e15/6ee7b7', substack:'1a0a2e/fda4af'
  };
  const c = colors[source] || '111827/94a3b8';
  const [bg, fg] = c.split('/');
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=${bg}&color=${fg}&size=64&bold=true`;
}

function formatContent(content) {
  if (!content) return '';
  // Strip HTML tags, split into paragraphs
  const stripped = content.replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').trim();
  return stripped.split(/\n{2,}/)
    .filter(p => p.trim())
    .map(p => `<p>${esc(p.trim())}</p>`)
    .join('');
}

function renderArticle(article) {
  const cat = CAT_STYLES[article.category] || { label: article.category || 'Article', bg:'rgba(148,163,184,0.1)', border:'rgba(148,163,184,0.3)', text:'#94A3B8', heroBg:'linear-gradient(135deg,#0B0E14,#111827)' };
  const authorName = article.author_name || (() => {
    const m = { congress:'Congress.gov', federalregister:'Federal Register', courtlistener:'CourtListener', usaspending:'USASpending' };
    return m[article.source] || article.source;
  })();
  const time = relativeTime(article.published_at || article.created_at);
  const url = article.source_url || '#';

  // Hero
  document.getElementById('hero-bg').style.background = cat.heroBg;
  document.getElementById('cat-tag').textContent = cat.label;
  document.getElementById('cat-tag').style.background = cat.bg;
  document.getElementById('cat-tag').style.borderColor = cat.border;
  document.getElementById('cat-tag').style.color = cat.text;
  document.getElementById('article-title').textContent = article.title;
  document.getElementById('author-name').textContent = authorName;
  document.getElementById('article-time').textContent = time;
  document.getElementById('author-avatar').src = avatarUrl(authorName, article.source);

  // Brief
  if (article.ai_brief) {
    document.getElementById('brief-text').textContent = article.ai_brief;
  } else {
    document.getElementById('brief-card').style.display = 'none';
  }

  // Body
  const bodyEl = document.getElementById('article-body');
  const content = formatContent(article.content);
  bodyEl.innerHTML = content || `<p style="color:#64748B">Full content available at the original source.</p>`;

  // Links
  document.getElementById('read-original').href = url;
  document.getElementById('share-btn').href = url;
  document.getElementById('bottom-read-btn').href = url;

  // Progress bar animation
  setTimeout(() => {
    document.getElementById('progress-bar').style.width = '100%';
  }, 300);

  document.title = `GovWatch - ${article.title}`;
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    document.getElementById('article-title').textContent = 'Article not found';
    return;
  }

  try {
    const res = await fetch(`${API}/api/articles/${id}`);
    if (!res.ok) throw new Error('Not found');
    const article = await res.json();
    renderArticle(article);
  } catch (err) {
    document.getElementById('article-title').textContent = 'Could not load article';
    document.getElementById('article-body').innerHTML =
      `<p style="color:#64748B">Make sure the backend is running on port 3000.</p>`;
  }
}

load();
</script>

</body>
</html>
