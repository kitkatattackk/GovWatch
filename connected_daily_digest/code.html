<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GovWatch - Daily Digest</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: #1e1e1e; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; }
  .device { position: relative; width: 393px; height: 852px; background: #1C1C1E; border-radius: 50px; border: 1.5px solid #3D3D3D; box-shadow: 0 0 0 1px #000, 0 40px 120px rgba(0,0,0,0.95), inset 0 1px 0 rgba(255,255,255,0.08); overflow: hidden; flex-shrink: 0; }
  .btn-vol-up, .btn-vol-dn { position: absolute; left: -3px; width: 3px; background: #2C2C2E; border-radius: 2px 0 0 2px; }
  .btn-vol-up { top: 120px; height: 36px; }
  .btn-vol-dn { top: 172px; height: 36px; }
  .btn-power { position: absolute; right: -3px; top: 140px; width: 3px; height: 60px; background: #2C2C2E; border-radius: 0 2px 2px 0; }
  .dynamic-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 200; }
  .phone { width: 100%; height: 100%; background: #0B0F1A; color: #F1F5F9; display: flex; flex-direction: column; overflow: hidden; }
  .phone-scroll { flex: 1; overflow-y: auto; }
  .phone-scroll::-webkit-scrollbar { display: none; }
  .msym { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; direction: ltr; font-size: 22px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .skeleton { background: #1A2235; border-radius: 8px; animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div class="device">
  <div class="dynamic-island"></div>
  <div class="btn-vol-up"></div>
  <div class="btn-vol-dn"></div>
  <div class="btn-power"></div>
<div class="phone">

  <!-- Status Bar -->
  <div class="shrink-0 flex items-center justify-between px-5 py-2 text-[11px] font-medium" style="background:#0B0F1A;color:#64748B">
    <span class="font-semibold" style="color:#CBD5E1" id="clock">9:41</span>
    <div class="flex items-center gap-2">
      <span class="msym" style="font-size:13px">signal_cellular_alt</span>
      <span class="msym" style="font-size:13px">wifi</span>
      <span class="msym" style="font-size:13px">battery_5_bar</span>
    </div>
  </div>

  <!-- Top App Bar -->
  <header class="shrink-0 px-4 pt-3 pb-4 border-b" style="background:rgba(11,15,26,0.97);border-color:#1A2235">
    <!-- Default header row -->
    <div id="header-default" class="flex items-center justify-between mb-0.5">
      <div class="flex items-center gap-2.5">
        <svg class="w-7 h-7" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="7" fill="#1D4ED8"/>
          <path d="M5 14C8.5 9 19.5 9 23 14C19.5 19 8.5 19 5 14Z" fill="white"/>
          <circle cx="14" cy="14" r="3.2" fill="#1E3A8A"/>
          <circle cx="14" cy="14" r="1.6" fill="#0F172A"/>
          <circle cx="12.8" cy="12.8" r="0.9" fill="white" opacity="0.75"/>
        </svg>
        <span class="text-white font-bold text-[19px] tracking-tight">GovWatch</span>
      </div>
      <button onclick="openSearch()" class="p-2 rounded-full text-slate-400 hover:bg-white/5 transition-colors">
        <span class="msym">search</span>
      </button>
    </div>
    <!-- Search row (hidden by default) -->
    <div id="header-search" class="hidden flex items-center gap-2 mb-0.5">
      <button onclick="closeSearch()" class="p-2 rounded-full text-slate-400 hover:bg-white/5 transition-colors flex-shrink-0">
        <span class="msym">arrow_back</span>
      </button>
      <div class="flex-1 flex items-center gap-2 rounded-xl px-3 py-2 border" style="background:#111827;border-color:#1E2A3B">
        <span class="msym" style="font-size:18px;color:#4B5568">search</span>
        <input id="search-input" type="text" placeholder="Search articles..."
          class="flex-1 bg-transparent text-[13px] text-white" style="border:none;outline:none"
          oninput="filterDigest(this.value)"/>
      </div>
    </div>
    <div class="mt-3" id="header-title">
      <p class="text-[11px] font-semibold uppercase tracking-widest mb-0.5" style="color:#3B82F6" id="date-label">—</p>
      <h1 class="text-2xl font-extrabold text-white tracking-tight">Daily Digest</h1>
      <p class="text-[12px] mt-0.5" style="color:#64748B" id="total-label">Loading...</p>
    </div>
  </header>

  <!-- Scrollable Content -->
  <div class="phone-scroll">
    <main class="pb-6" id="digest-content">
      <div class="mt-4 mx-4 space-y-3">
        <div class="skeleton h-40 w-full"></div>
        <div class="skeleton h-40 w-full"></div>
        <div class="skeleton h-40 w-full"></div>
      </div>
    </main>
  </div>

  <!-- Bottom Navigation -->
  <nav class="shrink-0 border-t pt-2 pb-6 px-2" style="background:#0B0F1A;border-color:#1A2235">
    <div class="flex justify-around items-center">
      <a href="../connected_home_feed/code.html" class="flex flex-col items-center gap-0.5 text-slate-500">
        <span class="msym">home</span>
        <span class="text-[10px] font-medium">Home</span>
      </a>
      <a href="#" class="flex flex-col items-center gap-0.5" style="color:#3B82F6">
        <span class="msym" style="font-variation-settings:'FILL' 1">auto_stories</span>
        <span class="text-[10px] font-semibold">Digest</span>
      </a>
      <a href="../connected_author_list/code.html" class="flex flex-col items-center gap-0.5 text-slate-500">
        <span class="msym">group</span>
        <span class="text-[10px] font-medium">Authors</span>
      </a>
      <a href="../connected_notifications/code.html" class="flex flex-col items-center gap-0.5 text-slate-500">
        <span class="msym">notifications</span>
        <span class="text-[10px] font-medium">Alerts</span>
      </a>
    </div>
  </nav>

</div><!-- /phone -->
</div><!-- /device -->

<script>
const API = 'http://localhost:3000';
let allGroups = [];

function openSearch() {
  document.getElementById('header-default').classList.add('hidden');
  document.getElementById('header-search').classList.remove('hidden');
  document.getElementById('header-title').classList.add('hidden');
  document.getElementById('search-input').focus();
}

function closeSearch() {
  document.getElementById('header-search').classList.add('hidden');
  document.getElementById('header-default').classList.remove('hidden');
  document.getElementById('header-title').classList.remove('hidden');
  document.getElementById('search-input').value = '';
  renderDigest(allGroups);
}

function filterDigest(query) {
  const q = query.toLowerCase().trim();
  if (!q) { renderDigest(allGroups); return; }

  const filtered = allGroups.map(group => ({
    ...group,
    articles: group.articles.filter(a =>
      a.title.toLowerCase().includes(q) ||
      (a.author_name || '').toLowerCase().includes(q) ||
      (a.source || '').toLowerCase().includes(q)
    ),
  })).filter(g => g.articles.length > 0);

  const content = document.getElementById('digest-content');
  if (filtered.length === 0) {
    content.innerHTML = `
      <div class="text-center py-20 text-slate-500">
        <span class="msym block mx-auto mb-2" style="font-size:36px">search_off</span>
        <p class="text-sm">No results for "${esc(query)}"</p>
      </div>`;
  } else {
    content.innerHTML = filtered.map(renderSection).join('');
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}
updateClock();
setInterval(updateClock, 10000);

function relativeTime(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  if (diff < 0) return 'recently';
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return Math.floor(hrs/24) === 1 ? 'Yesterday' : `${Math.floor(hrs/24)}d ago`;
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const CAT = {
  bills_votes:         { label: 'Bills & Votes',      dot: '#3B82F6', badge: 'rgba(59,130,246,0.15)',  text: '#93C5FD' },
  executive_orders:    { label: 'Executive Orders',    dot: '#F59E0B', badge: 'rgba(245,158,11,0.15)',  text: '#FCD34D' },
  court_rulings:       { label: 'Court Rulings',       dot: '#A78BFA', badge: 'rgba(167,139,250,0.15)', text: '#C4B5FD' },
  government_spending: { label: 'Government Spending', dot: '#34D399', badge: 'rgba(52,211,153,0.15)',  text: '#6EE7B7' },
  opinion:             { label: 'Opinion',             dot: '#F472B6', badge: 'rgba(244,114,182,0.15)', text: '#FDA4AF' },
};

function sourceLabel(a) {
  if (a.author_name) return a.author_name;
  const map = { congress:'Congress.gov', federalregister:'Federal Register', courtlistener:'CourtListener', usaspending:'USASpending' };
  return map[a.source] || a.source;
}

function renderSection(group) {
  const cat = CAT[group.category] || { label: group.category, dot: '#94A3B8', badge: 'rgba(148,163,184,0.15)', text: '#94A3B8' };
  const articles = group.articles || [];

  const rows = articles.map((a, i) => {
    const isLast = i === articles.length - 1;
    return `
    <div class="p-4 ${isLast ? '' : 'border-b'} cursor-pointer hover:bg-white/5 transition-colors"
         style="border-color:#1A2235"
         onclick="openArticle(${a.id})">
      <p class="text-[14px] font-semibold text-white leading-snug mb-1.5">${esc(a.title)}</p>
      <div class="flex items-center justify-between">
        <span class="text-[11px]" style="color:#64748B">${esc(sourceLabel(a))}</span>
        <span class="text-[11px]" style="color:#64748B">${relativeTime(a.published_at||a.created_at)}</span>
      </div>
    </div>`;
  }).join('');

  const summaryBlock = group.summary ? `
    <div class="mx-4 mb-2 p-3 rounded-xl text-[12px] leading-relaxed" style="background:rgba(37,99,235,0.08);border:1px solid rgba(37,99,235,0.2);color:#8899AA">
      <span class="font-semibold text-xs" style="color:#60A5FA">AI Summary&nbsp;&nbsp;</span>${esc(group.summary)}
    </div>` : '';

  return `
  <section class="mt-5 mx-4">
    <div class="flex items-center gap-2.5 mb-2.5">
      <div class="w-2 h-2 rounded-full flex-shrink-0" style="background:${cat.dot}"></div>
      <span class="text-[13px] font-bold text-white uppercase tracking-wide">${cat.label}</span>
      <span class="px-2 py-0.5 rounded-full text-[10px] font-bold" style="background:${cat.badge};color:${cat.text}">${articles.length}</span>
    </div>
    ${summaryBlock}
    <div class="rounded-2xl border overflow-hidden" style="background:#111827;border-color:#1E2A3B">
      ${rows || '<div class="p-4 text-sm text-slate-500">No articles yet.</div>'}
    </div>
  </section>`;
}

function renderDigest(groups) {
  document.getElementById('digest-content').innerHTML = groups.map(renderSection).join('');
}

function openArticle(id) {
  window.location.href = `../connected_article_detail/code.html?id=${id}`;
}

async function loadDigest() {
  const content = document.getElementById('digest-content');

  try {
    let res = await fetch(`${API}/api/digest/today`);
    let data = await res.json();
    let groups = data.digest || [];

    if (groups.length === 0) {
      res = await fetch(`${API}/api/digest`);
      data = await res.json();
      groups = (data.digest || []).map(g => ({ ...g, summary: null }));
    }

    const today = new Date();
    const dateStr = today.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    document.getElementById('date-label').textContent = dateStr;
    document.getElementById('total-label').textContent =
      `${data.total || 0} articles from the last 24 hours`;

    if (groups.length === 0) {
      content.innerHTML = `
        <div class="text-center py-20 text-slate-500">
          <span class="msym block mx-auto mb-2" style="font-size:36px">auto_stories</span>
          <p class="text-sm">No digest yet today.</p>
          <p class="text-xs mt-1">Trigger a poll to generate content.</p>
        </div>`;
      return;
    }

    allGroups = groups;
    renderDigest(groups);
  } catch (err) {
    console.error(err);
    content.innerHTML = `
      <div class="mx-4 mt-4 p-3 rounded-xl text-sm text-red-300 border border-red-900/50" style="background:rgba(127,29,29,0.3)">
        Couldn't load digest. Is the backend running on port 3000?
      </div>`;
  }
}

loadDigest();
</script>

</body>
</html>
