<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=390, initial-scale=1.0"/>
<title>GovWatch - Authors</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  body { background: #0B0F1A; color: #F1F5F9; font-family: 'Inter', sans-serif; max-width: 390px; margin: 0 auto; min-height: 100vh; }
  .msym { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; direction: ltr; font-size: 22px; }
  ::-webkit-scrollbar { display: none; }
  input::placeholder { color: #4B5568; }
  input { outline: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .skeleton { background: #1A2235; border-radius: 8px; animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="flex items-center justify-between px-5 py-2 text-[11px] font-medium" style="background:#0B0F1A;color:#64748B">
  <span class="font-semibold" style="color:#CBD5E1" id="clock">9:41</span>
  <div class="flex items-center gap-2">
    <span class="msym" style="font-size:13px">signal_cellular_alt</span>
    <span class="msym" style="font-size:13px">wifi</span>
    <span class="msym" style="font-size:13px">battery_5_bar</span>
  </div>
</div>

<!-- Top App Bar -->
<header class="sticky top-0 z-50 px-4 pt-3 pb-4 border-b" style="background:rgba(11,15,26,0.97);backdrop-filter:blur(12px);border-color:#1A2235">
  <div class="flex items-center justify-between mb-3">
    <div class="flex items-center gap-2.5">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:#2563EB">
        <span class="text-white font-black text-sm" style="letter-spacing:-0.5px">G</span>
      </div>
      <span class="text-white font-bold text-[19px] tracking-tight">GovWatch</span>
    </div>
    <button class="p-2 rounded-full text-slate-400">
      <span class="msym">notifications</span>
    </button>
  </div>
  <!-- Search Bar -->
  <div class="flex items-center gap-2.5 rounded-xl px-3 py-2.5 border" style="background:#111827;border-color:#1E2A3B">
    <span class="msym" style="font-size:18px;color:#4B5568">search</span>
    <input id="search-input" type="text" placeholder="Search followed authors..."
      class="flex-1 bg-transparent text-[13px] text-white" style="border:none"/>
  </div>
</header>

<!-- Content -->
<main class="pb-28">

  <!-- Following Section -->
  <div class="px-4 pt-5 pb-2 flex items-center justify-between">
    <span class="text-[11px] font-bold uppercase tracking-widest" style="color:#3B82F6">Following</span>
    <span id="count-badge" class="text-[11px] font-medium px-2 py-0.5 rounded-full" style="color:#3B82F6;background:rgba(59,130,246,0.12)">— authors</span>
  </div>

  <div id="following-list" class="mx-4 rounded-2xl border overflow-hidden" style="background:#111827;border-color:#1E2A3B">
    <div class="skeleton h-16 w-full m-2" style="width:calc(100% - 1rem)"></div>
    <div class="skeleton h-16 w-full m-2" style="width:calc(100% - 1rem)"></div>
  </div>

  <!-- Add Author -->
  <div class="mx-4 mt-5">
    <p class="text-[11px] font-bold uppercase tracking-widest mb-3" style="color:#64748B">Add Author</p>
    <div class="rounded-2xl border p-4 space-y-3" style="background:#111827;border-color:#1E2A3B">
      <div>
        <label class="text-[11px] font-semibold uppercase tracking-wider mb-1 block" style="color:#64748B">Name</label>
        <input id="add-name" type="text" placeholder="e.g. Judd Legum"
          class="w-full bg-transparent text-[13px] text-white rounded-lg px-3 py-2.5 border"
          style="border-color:#1E2A3B;background:#0B0F1A"/>
      </div>
      <div>
        <label class="text-[11px] font-semibold uppercase tracking-wider mb-1 block" style="color:#64748B">Substack Slug</label>
        <input id="add-slug" type="text" placeholder="e.g. popular-information"
          class="w-full bg-transparent text-[13px] text-white rounded-lg px-3 py-2.5 border"
          style="border-color:#1E2A3B;background:#0B0F1A"/>
      </div>
      <button id="add-btn" onclick="addAuthor()"
        class="w-full py-2.5 rounded-xl text-[13px] font-semibold text-white"
        style="background:#2563EB">
        Follow Author
      </button>
      <p id="add-error" class="text-[12px] text-red-400 hidden"></p>
    </div>
  </div>

  <!-- Suggested Authors -->
  <div class="px-4 pt-6 pb-2">
    <span class="text-[11px] font-bold uppercase tracking-widest" style="color:#64748B">Suggested</span>
  </div>
  <div class="mx-4 rounded-2xl border overflow-hidden" style="background:#111827;border-color:#1E2A3B">
    <div id="suggested-list"></div>
  </div>

</main>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 border-t pt-2 pb-6 px-2" style="background:#0B0F1A;border-color:#1A2235;max-width:390px;margin:0 auto">
  <div class="flex justify-around items-center">
    <a href="../connected_home_feed/code.html" class="flex flex-col items-center gap-0.5 text-slate-500">
      <span class="msym">home</span>
      <span class="text-[10px] font-medium">Home</span>
    </a>
    <a href="../connected_daily_digest/code.html" class="flex flex-col items-center gap-0.5 text-slate-500">
      <span class="msym">auto_stories</span>
      <span class="text-[10px] font-medium">Digest</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-0.5" style="color:#3B82F6">
      <span class="msym" style="font-variation-settings:'FILL' 1">group</span>
      <span class="text-[10px] font-semibold">Authors</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-0.5 text-slate-500">
      <span class="msym">notifications</span>
      <span class="text-[10px] font-medium">Alerts</span>
    </a>
  </div>
</nav>

<script>
const API = 'https://govwatch-production-ddaf.up.railway.app';
let allAuthors = [];

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}
updateClock();

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function avatarUrl(name) {
  const enc = encodeURIComponent(name);
  return `https://ui-avatars.com/api/?name=${enc}&background=162850&color=93c5fd&size=64&bold=true`;
}

function renderAuthorRow(a, isLast, isFollowing) {
  const border = isLast ? '' : 'border-b';
  if (isFollowing) {
    return `
    <div class="flex items-center gap-3 px-4 py-3.5 ${border}" style="border-color:#1A2235" data-id="${a.id}">
      <img src="${avatarUrl(a.name)}" class="w-11 h-11 rounded-full object-cover flex-shrink-0"/>
      <div class="flex-1 min-w-0">
        <p class="text-[14px] font-semibold text-white leading-none mb-0.5">${esc(a.name)}</p>
        <p class="text-[11px] truncate" style="color:#64748B">substack.com/${esc(a.substack_slug)}</p>
      </div>
      <button onclick="unfollowAuthor(${a.id})"
        class="text-[12px] font-semibold px-3 py-1.5 rounded-lg"
        style="background:#172D52;color:#93C5FD;border:1px solid rgba(59,130,246,0.3)">Following</button>
    </div>`;
  } else {
    return `
    <div class="flex items-center gap-3 px-4 py-3.5 ${border}" style="border-color:#1A2235">
      <img src="${avatarUrl(a.name)}" class="w-11 h-11 rounded-full object-cover flex-shrink-0"/>
      <div class="flex-1 min-w-0">
        <p class="text-[14px] font-semibold text-white leading-none mb-0.5">${esc(a.name)}</p>
        <p class="text-[11px] truncate" style="color:#64748B">${esc(a.slug)}</p>
      </div>
      <button onclick="quickFollow('${esc(a.name)}','${esc(a.slug)}')"
        class="text-[12px] font-semibold px-3 py-1.5 rounded-lg text-white"
        style="background:#2563EB">Follow</button>
    </div>`;
  }
}

function renderFollowing(authors) {
  const list = document.getElementById('following-list');
  const badge = document.getElementById('count-badge');
  badge.textContent = `${authors.length} author${authors.length !== 1 ? 's' : ''}`;

  if (authors.length === 0) {
    list.innerHTML = `<div class="p-4 text-sm text-slate-500 text-center">Not following anyone yet.</div>`;
    return;
  }
  list.innerHTML = authors.map((a, i) => renderAuthorRow(a, i === authors.length - 1, true)).join('');
}

const SUGGESTED = [
  { name: 'Judd Legum',     slug: 'popular-information' },
  { name: 'Robert Reich',   slug: 'robertreich' },
  { name: 'Joyce Vance',    slug: 'joycevance' },
  { name: 'Andrew Weissmann', slug: 'andrewweissmann' },
];

function renderSuggested(following) {
  const followingSlugs = new Set(following.map(a => a.substack_slug));
  const available = SUGGESTED.filter(s => !followingSlugs.has(s.slug));
  const sugList = document.getElementById('suggested-list');
  if (available.length === 0) {
    sugList.innerHTML = `<div class="p-4 text-sm text-slate-500">You're following all our suggestions!</div>`;
    return;
  }
  sugList.innerHTML = available.map((a, i) => renderAuthorRow(a, i === available.length - 1, false)).join('');
}

async function loadAuthors() {
  try {
    const res = await fetch(`${API}/api/authors`);
    allAuthors = await res.json();
    renderFollowing(allAuthors);
    renderSuggested(allAuthors);
  } catch (err) {
    document.getElementById('following-list').innerHTML =
      `<div class="p-4 text-sm text-red-400">Couldn't load authors. Is the backend running?</div>`;
  }
}

async function unfollowAuthor(id) {
  if (!confirm('Unfollow this author?')) return;
  try {
    await fetch(`${API}/api/authors/${id}`, { method: 'DELETE' });
    await loadAuthors();
  } catch (err) {
    alert('Failed to unfollow. Try again.');
  }
}

async function addAuthor() {
  const name = document.getElementById('add-name').value.trim();
  const slug = document.getElementById('add-slug').value.trim();
  const errEl = document.getElementById('add-error');
  errEl.classList.add('hidden');

  if (!name || !slug) {
    errEl.textContent = 'Both name and slug are required.';
    errEl.classList.remove('hidden');
    return;
  }

  const btn = document.getElementById('add-btn');
  btn.textContent = 'Adding...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/api/authors`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, substack_slug: slug }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    document.getElementById('add-name').value = '';
    document.getElementById('add-slug').value = '';
    await loadAuthors();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.textContent = 'Follow Author';
    btn.disabled = false;
  }
}

async function quickFollow(name, slug) {
  try {
    await fetch(`${API}/api/authors`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, substack_slug: slug }),
    });
    await loadAuthors();
  } catch (err) {
    alert('Failed to follow. Try again.');
  }
}

// Live search filter
document.getElementById('search-input').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  const list = document.getElementById('following-list');
  const filtered = allAuthors.filter(a => a.name.toLowerCase().includes(q));
  if (filtered.length === 0 && q) {
    list.innerHTML = `<div class="p-4 text-sm text-slate-500">No results for "${q}".</div>`;
  } else {
    renderFollowing(filtered);
  }
});

loadAuthors();
</script>

</body>
</html>
